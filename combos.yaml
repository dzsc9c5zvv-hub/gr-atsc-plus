# Configuration matrix for the synthetic-bench sweep.
# Each combo names which forked blocks to use and their parameters.
# Used by benchmark_synth.py and run_combo.py.

combos:
  - name: stock
    description: gr-dtv stock pipeline (baseline)
    fpll: stock
    sync: stock
    eq: stock
    viterbi: stock

  - name: long_eq
    description: 256-tap DD-LMS equalizer only
    fpll: stock
    sync: stock
    eq: long
    viterbi: stock

  - name: soft_vit
    description: L2-metric soft Viterbi only
    fpll: stock
    sync: stock
    eq: stock
    viterbi: soft

  - name: long_eq_soft_vit
    description: 256-tap eq + soft Viterbi
    fpll: stock
    sync: stock
    eq: long
    viterbi: soft

  - name: tight_fpll
    description: tight FPLL alpha=0.003 tau=20us only
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: very_tight_fpll
    description: extra-tight FPLL alpha=0.001 tau=50us
    fpll: tight
    fpll_alpha: 0.001
    fpll_afc_tau_us: 50.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: hysteresis_sync
    description: relaxed sync lock=3 unlock=1, no force-emit
    fpll: stock
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: stock
    viterbi: stock

  - name: force_emit_sync
    description: relaxed sync + force-emit
    fpll: stock
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: true
    eq: stock
    viterbi: stock

  - name: max_relax_sync
    description: max-relax sync lock=1 unlock=1 force-emit
    fpll: stock
    sync: tunable
    sync_min_lock: 1
    sync_unlock: 1
    sync_emit_unlocked: true
    eq: stock
    viterbi: stock

  # Combinations
  - name: tight_fpll_long_eq
    description: tight FPLL + 256-tap eq
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: long
    viterbi: stock

  - name: tight_fpll_soft_vit
    description: tight FPLL + soft Viterbi
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: soft

  - name: hysteresis_long_eq
    description: hysteresis sync + 256-tap eq
    fpll: stock
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: long
    viterbi: stock

  - name: hysteresis_long_eq_soft_vit
    description: hysteresis sync + 256-tap eq + soft Viterbi
    fpll: stock
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: long
    viterbi: soft

  - name: tight_fpll_hysteresis
    description: tight FPLL + hysteresis sync
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: stock
    viterbi: stock

  - name: full_stack
    description: tight FPLL + hysteresis sync + 256-tap eq + soft Viterbi
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: long
    viterbi: soft

  - name: full_stack_force_emit
    description: full stack but with force-emit sync
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: tunable
    sync_min_lock: 3
    sync_unlock: 1
    sync_emit_unlocked: true
    eq: long
    viterbi: soft

  # --- New combos: FPLL alpha/tau sweep ---

  - name: fpll_a002_tau20
    description: FPLL alpha=0.002 tau=20us (between stock and tight)
    fpll: tight
    fpll_alpha: 0.002
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: fpll_a004_tau20
    description: FPLL alpha=0.004 tau=20us (softer than tight)
    fpll: tight
    fpll_alpha: 0.004
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: fpll_a005_tau20
    description: FPLL alpha=0.005 tau=20us
    fpll: tight
    fpll_alpha: 0.005
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: fpll_a003_tau10
    description: tight FPLL alpha=0.003 tau=10us (tighter tau)
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 10.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: fpll_a003_tau40
    description: tight FPLL alpha=0.003 tau=40us (looser tau)
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 40.0
    sync: stock
    eq: stock
    viterbi: stock

  - name: fpll_a002_tau40
    description: FPLL alpha=0.002 tau=40us
    fpll: tight
    fpll_alpha: 0.002
    fpll_afc_tau_us: 40.0
    sync: stock
    eq: stock
    viterbi: stock

  # --- New combos: soft Viterbi + FPLL sweep ---

  - name: fpll_soft_a004_tau20
    description: FPLL alpha=0.004 tau=20us + soft Viterbi
    fpll: tight
    fpll_alpha: 0.004
    fpll_afc_tau_us: 20.0
    sync: stock
    eq: stock
    viterbi: soft

  - name: fpll_soft_a002_tau40
    description: FPLL alpha=0.002 tau=40us + soft Viterbi
    fpll: tight
    fpll_alpha: 0.002
    fpll_afc_tau_us: 40.0
    sync: stock
    eq: stock
    viterbi: soft

  - name: fpll_soft_a003_tau10
    description: tight FPLL alpha=0.003 tau=10us + soft Viterbi
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 10.0
    sync: stock
    eq: stock
    viterbi: soft

  # --- New combos: sync parameter sweep ---

  - name: sync_lock2_unlock1
    description: tunable sync min_lock=2 unlock=1 (tighter than stock, looser than tight)
    fpll: stock
    sync: tunable
    sync_min_lock: 2
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: stock
    viterbi: stock

  - name: sync_lock4_unlock4
    description: tunable sync min_lock=4 unlock=4 (more hysteresis)
    fpll: stock
    sync: tunable
    sync_min_lock: 4
    sync_unlock: 4
    sync_emit_unlocked: false
    eq: stock
    viterbi: stock

  # --- New combos: tight FPLL stacked with sync variants ---

  - name: tight_fpll_sync_lock2
    description: tight FPLL + tunable sync min_lock=2 unlock=1
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: tunable
    sync_min_lock: 2
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: stock
    viterbi: stock

  - name: tight_fpll_soft_sync_lock2
    description: tight FPLL + soft Viterbi + tunable sync min_lock=2 unlock=1
    fpll: tight
    fpll_alpha: 0.003
    fpll_afc_tau_us: 20.0
    sync: tunable
    sync_min_lock: 2
    sync_unlock: 1
    sync_emit_unlocked: false
    eq: stock
    viterbi: soft

# SNR levels to sweep against synthetic ATSC signals.
snr_db: [10, 12, 14, 16, 18, 20, 25]

# Synthetic-channel options (multipath profiles).
channels:
  - name: awgn
    description: AWGN only, no multipath
    paths: []
  - name: brazil_a
    description: Brazil A multipath profile (light)
    paths:
      - {delay_us: 0.15, gain_db: -13.8, doppler_hz: 0}
      - {delay_us: 2.22, gain_db: -16.2, doppler_hz: 0}
      - {delay_us: 5.05, gain_db: -14.9, doppler_hz: 0}
      - {delay_us: 9.05, gain_db: -13.6, doppler_hz: 0}
      - {delay_us: 12.4, gain_db: -16.4, doppler_hz: 0}
  - name: brazil_b
    description: Brazil B multipath profile (heavy, single ghost)
    paths:
      - {delay_us: 0.30, gain_db: -12.0, doppler_hz: 0}
      - {delay_us: 3.50, gain_db: -4.0,  doppler_hz: 0}
      - {delay_us: 4.40, gain_db: -7.0,  doppler_hz: 0}
      - {delay_us: 9.50, gain_db: -15.0, doppler_hz: 0}
      - {delay_us: 12.7, gain_db: -22.0, doppler_hz: 0}

# Threshold for declaring "improvement vs stock".
improvement_threshold:
  rs_clean_delta: 0.10  # combo must beat stock RS-clean by 10% absolute
  snr_db_max: 14        # at SNR <= 14 dB (stock breakdown region)
